services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.server
    # Port exposed to local network for testing — safe to remove in production
    ports:
      - "3001:3001"
    volumes:
      # Persists all data (opportunities, subscribers, logs) across container restarts
      - ./data:/app/data
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - internal

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - internal

networks:
  internal:
    driver: bridge
