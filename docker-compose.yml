services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.server
    # Port exposed to local network for testing — safe to remove in production
    ports:
      - "3001:3001"
    volumes:
      # Persists all data (opportunities, subscribers, logs) across container restarts
      - ./data:/app/data
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1g        # Chromium can spike — cap at 1GB
        reservations:
          memory: 256m      # Guaranteed minimum
    logging:
      driver: json-file
      options:
        max-size: "20m"     # Rotate at 20MB
        max-file: "5"       # Keep last 5 files (100MB total max)
    networks:
      - internal

  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: unless-stopped
    networks:
      - internal

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - api
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - internal

volumes:
  portainer_data:
    external: true

networks:
  internal:
    driver: bridge
