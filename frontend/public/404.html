<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>EuroSpace Student Hub</title>
  <script>
    // GitHub Pages SPA fix: store the intended path and redirect to root.
    // React Router will restore the path once the app loads.
    var path = window.location.pathname + window.location.search + window.location.hash;
    sessionStorage.setItem('ghpages_redirect', path);
    window.location.replace('/');
  </script>
</head>
<body></body>
</html>
